server {
    listen 8080;
    server_name tel.sellixcore.ru;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;

    resolver 8.8.8.8 1.1.1.1 valid=300s ipv6=off;
    resolver_timeout 5s;

    location = / {
        return 302 /k/;
    }

    location /k/ {
        set $telegram_backend "web.telegram.org";
        proxy_pass https://$telegram_backend;

        proxy_ssl_server_name on;
        proxy_ssl_name web.telegram.org;

        proxy_ssl_protocols TLSv1.3;
        proxy_ssl_ciphers 'ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES256-GCM-SHA384';

        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_set_header Host web.telegram.org;
        proxy_set_header Origin https://web.telegram.org;
        proxy_set_header Referer https://web.telegram.org/k/;

        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36";
        proxy_set_header Accept "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8";
        proxy_set_header Accept-Language "ru-RU,ru;q=0.9,en-US;q=0.8,en;q=0.7";
        proxy_set_header Accept-Encoding "gzip, deflate, br";
        proxy_set_header Cache-Control "max-age=0";
        proxy_set_header Sec-Ch-Ua '"Chromium";v="148", "Google Chrome";v="148", "Not/A)Brand";v="99"';
        proxy_set_header Sec-Ch-Ua-Mobile "?0";
        proxy_set_header Sec-Ch-Ua-Platform '"Windows"';
        proxy_set_header Sec-Fetch-Dest "document";
        proxy_set_header Sec-Fetch-Mode "navigate";
        proxy_set_header Sec-Fetch-Site "none";
        proxy_set_header Sec-Fetch-User "?1";
        proxy_set_header Upgrade-Insecure-Requests "1";
        proxy_set_header Priority "u=0, i";
        proxy_set_header DNT "1";

        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header X-Forwarded-Host "";
        proxy_set_header Forwarded "";
        proxy_set_header Via "";

        proxy_pass_header Set-Cookie;
        proxy_cookie_domain web.telegram.org tel.sellixcore.ru;
        proxy_cookie_path / /;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        proxy_buffer_size 256k;
        proxy_buffers 8 512k;
        proxy_busy_buffers_size 512k;

        proxy_no_cache 1;
        proxy_cache_bypass 1;

        proxy_redirect ~^https://web\.telegram\.org/k/(.*)$ https://tel.sellixcore.ru/k/$1;
        proxy_redirect ~^https://web\.telegram\.org/(.*)$ https://tel.sellixcore.ru/$1;
        proxy_redirect ~^https://([^/]*\.)?telegram\.org/(.*)$ https://tel.sellixcore.ru/$2;
    }

    location ~* ^/(api|apiw[0-9]|pluto|account|auth|login|qrcode|qr) {
        set $telegram_backend "web.telegram.org";
        proxy_pass https://$telegram_backend;

        proxy_ssl_server_name on;
        proxy_ssl_name web.telegram.org;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_set_header Host web.telegram.org;
        proxy_set_header Origin https://web.telegram.org;
        proxy_set_header Referer https://web.telegram.org/k/;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36";

        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Real-IP "";
        proxy_set_header Via "";

        proxy_pass_header Set-Cookie;
        proxy_cookie_domain web.telegram.org tel.sellixcore.ru;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|json|wasm|map|worker\.js)$ {
        set $telegram_backend "web.telegram.org";
        proxy_pass https://$telegram_backend;

        proxy_ssl_server_name on;
        proxy_ssl_name web.telegram.org;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_set_header Host web.telegram.org;
        proxy_set_header Origin https://web.telegram.org;
        proxy_set_header Referer https://web.telegram.org/k/;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36";

        proxy_set_header X-Forwarded-For "";
        proxy_set_header Via "";

        proxy_buffering on;
        proxy_cache_valid 200 1h;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /sw.js {
        set $telegram_backend "web.telegram.org";
        proxy_pass https://$telegram_backend/k/sw.js;

        proxy_ssl_server_name on;
        proxy_ssl_name web.telegram.org;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_set_header Host web.telegram.org;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36";
        proxy_set_header X-Forwarded-For "";
        proxy_set_header Via "";

        add_header Service-Worker-Allowed "/";
        proxy_buffering off;
    }
}