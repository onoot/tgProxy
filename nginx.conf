server {
    listen 8080;
    server_name tel.sellixcore.ru;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;

    resolver 8.8.8.8 1.1.1.1 77.88.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    location = / {
        return 302 /k/;
    }

    location ^~ /tgweb/ {
        rewrite ^/tgweb/(.*)$ /$1 break;

        proxy_pass https://web.telegram.org;

        proxy_ssl_server_name on;
        proxy_ssl_name web.telegram.org;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_set_header Host web.telegram.org;
        proxy_set_header Origin https://web.telegram.org;
        proxy_set_header Referer https://web.telegram.org/k/;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36";
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Real-IP "";
        proxy_set_header Via "";

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Accept, Content-Type" always;

        proxy_pass_header Set-Cookie;
        proxy_cookie_domain web.telegram.org tel.sellixcore.ru;
        proxy_cookie_path / /;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_buffering off;
        proxy_read_timeout 86400s;

        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types application/javascript text/css application/json text/xml application/xml text/plain;

        sub_filter 'https://web.telegram.org/' '/tgweb/';
        sub_filter '"//web.telegram.org' '"/tgweb';
        sub_filter "'//web.telegram.org" "'/tgweb";
        sub_filter '"web.telegram.org"' '"/tgweb"';
        sub_filter "'web.telegram.org'" "'/tgweb'";
        sub_filter 'https://telegram.org/' '/tgweb/';
        sub_filter '//telegram.org' '//tel.sellixcore.ru/tgweb/';
    }

    location / {
        set $tg_backend "web.telegram.org";
        proxy_pass https://$tg_backend;

        proxy_ssl_server_name on;
        proxy_ssl_name web.telegram.org;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_set_header Host web.telegram.org;
        proxy_set_header Origin https://web.telegram.org;
        proxy_set_header Referer https://web.telegram.org/k/;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36";
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Real-IP "";
        proxy_set_header Via "";

        proxy_pass_header Set-Cookie;
        proxy_cookie_domain web.telegram.org tel.sellixcore.ru;
        proxy_cookie_path / /;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_buffering off;
        proxy_read_timeout 86400s;

        proxy_set_header Accept-Encoding "";

        sub_filter_once off;
        sub_filter_types application/javascript text/css application/json text/xml application/xml text/plain;

        sub_filter 'https://web.telegram.org/' '/tgweb/';
        sub_filter "https:\/\/web.telegram.org" "/tgweb";
        sub_filter 'https:\\/\\/web.telegram.org' '/tgweb';

        sub_filter '"//web.telegram.org' '"/tgweb';
        sub_filter "'//web.telegram.org" "'/tgweb";
        sub_filter '"\/\/web.telegram.org' '"/tgweb';
        sub_filter "'\/\/web.telegram.org" "'/tgweb";
        sub_filter '`//web.telegram.org' '`/tgweb';

        sub_filter '"web.telegram.org"' '"/tgweb"';
        sub_filter "'web.telegram.org'" "'/tgweb'";

        sub_filter 'https://telegram.org/' '/tgweb/';
        sub_filter '"//telegram.org' '"/tgweb';
        sub_filter "'//telegram.org" "'/tgweb";

        sub_filter 'https://venus.web.telegram.org/' '/tgweb/';
        sub_filter 'https://pluto.web.telegram.org/' '/tgweb/';
        sub_filter 'https://cdn.web.telegram.org/' '/tgweb/';

        sub_filter '</head>' '<script>
(function(){
  // Удаляем старый Service Worker
  if(navigator.serviceWorker){
    navigator.serviceWorker.getRegistrations().then(function(r){
      r.forEach(function(s){s.unregister()});
    });
    // Перехватываем регистрацию — подменяем URL на proxy
    var _r=navigator.serviceWorker.register;
    navigator.serviceWorker.register=function(u,o){
      if(typeof u=="string"&&u.indexOf("tel.sellixcore.ru")===-1){
        u=u.replace("web.telegram.org","tel.sellixcore.ru").replace("//telegram.org","//tel.sellixcore.ru");
        if(u.indexOf("/")===0)u="/tgweb"+u;
      }
      return _r.call(this,u,o);
    };
  }
})();
<\/script></head>';

        proxy_redirect https://web.telegram.org/ /tgweb/;
        proxy_redirect http://web.telegram.org/ /tgweb/;
        proxy_redirect https://telegram.org/ /tgweb/;
    }

    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|json|wasm|map|webmanifest)$ {
        set $tg_backend "web.telegram.org";
        proxy_pass https://$tg_backend;

        proxy_ssl_server_name on;
        proxy_ssl_name web.telegram.org;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_set_header Host web.telegram.org;
        proxy_set_header Origin https://web.telegram.org;
        proxy_set_header Referer https://web.telegram.org/k/;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36";
        proxy_set_header X-Forwarded-For "";
        proxy_set_header Via "";

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Accept, Content-Type" always;

        proxy_buffering on;
        proxy_read_timeout 30s;
        proxy_set_header Accept-Encoding "";
        expires 30d;

        sub_filter_once off;
        sub_filter_types application/javascript application/json application/manifest+json text/css text/javascript;

        sub_filter 'https://web.telegram.org/' '/tgweb/';
        sub_filter '"//web.telegram.org' '"/tgweb';
        sub_filter "'//web.telegram.org" "'/tgweb";
        sub_filter '"web.telegram.org"' '"/tgweb"';
        sub_filter "'web.telegram.org'" "'/tgweb'";

        sub_filter 'https://telegram.org/' '/tgweb/';
        sub_filter '//telegram.org' '//tel.sellixcore.ru/tgweb/';
    }
}
