version: '3.8'

services:
  telegram-proxy:
    image: nginx:1.25-alpine
    container_name: telegram-proxy
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - CORP_DOMAIN=tel.sellixcore.ru
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    command: >
      /bin/sh -c "
        envsubst '$${CORP_DOMAIN}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf &&
        nginx -g 'daemon off;'
      "
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
    name: other-proxy-cin3fc_default